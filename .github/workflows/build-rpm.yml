name: Build RPM

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install copr httpx pytest
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  build-rpm:
    name: Build RPM (${{ matrix.fedora_version }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        fedora_version: ['43', '44']
    container:
      image: fedora:${{ matrix.fedora_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            python3-devel \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            pyproject-rpm-macros \
            tar

      - name: Create source archive
        run: |
          tar czf copa-0.1.0.tar.gz --transform='s,^.,copa-0.1.0,' .

      - name: Build RPM
        run: |
          mkdir -p build/RPMS build/SRPMS
          rpmbuild -bb rpm/copa.spec \
            --define "_topdir $(pwd)/build" \
            --define "_sourcedir $(pwd)" \
            --target noarch

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: copa-rpm-fc${{ matrix.fedora_version }}
          path: build/RPMS/noarch/*.rpm

  build-srpm:
    name: Build SRPM
    runs-on: ubuntu-latest
    needs: test
    container:
      image: fedora:44
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            python3-devel \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            pyproject-rpm-macros \
            tar

      - name: Create source archive
        run: |
          tar czf copa-0.1.0.tar.gz --transform='s,^.,copa-0.1.0,' .

      - name: Build SRPM
        run: |
          mkdir -p build/SRPMS
          rpmbuild -bs rpm/copa.spec \
            --define "_topdir $(pwd)/build" \
            --define "_sourcedir $(pwd)"

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: copa-srpm
          path: build/SRPMS/*.src.rpm

  publish-copr:
    name: Publish to Copr
    runs-on: ubuntu-latest
    needs: [build-rpm, build-srpm]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download SRPM
        uses: actions/download-artifact@v4
        with:
          name: copa-srpm
          path: srpm/

      - name: Upload to Copr
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          # Install copr-cli
          pip install copr-cli

          # Configure copr-cli
          mkdir -p ~/.config
          cat > ~/.config/copr <<EOF
          [copr-cli]
          login = ${COPR_LOGIN}
          username = ${COPR_USERNAME}
          token = ${COPR_TOKEN}
          copr_url = https://copr.fedorainfracloud.org
          EOF

          # Upload SRPM
          copr-cli build fedora-copa srpm/*.src.rpm
