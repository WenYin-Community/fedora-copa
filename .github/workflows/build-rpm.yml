name: Build RPM

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install copr httpx pytest
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  build-rpm:
    name: Build RPM (${{ matrix.fedora_version }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        fedora_version: ['43', '44']
    container:
      image: fedora:${{ matrix.fedora_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            python3-devel \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            python3-copr \
            python3-httpx \
            python3-pytest \
            tar

      - name: Create source archive
        run: |
          VERSION=$(grep '__version__' copa/__init__.py | sed 's/.*"\(.*\)"/\1/')
          cd /tmp
          cp -r $GITHUB_WORKSPACE copa-${VERSION}
          tar czf $GITHUB_WORKSPACE/copa-${VERSION}.tar.gz copa-${VERSION}
          rm -rf copa-${VERSION}

      - name: Build RPM
        run: |
          mkdir -p build/RPMS build/SRPMS
          rpmbuild -bb rpm/copa.spec \
            --define "_topdir $(pwd)/build" \
            --define "_sourcedir $(pwd)" \
            --target noarch

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: copa-rpm-fc${{ matrix.fedora_version }}
          path: build/RPMS/noarch/*.rpm

  build-srpm:
    name: Build SRPM
    runs-on: ubuntu-latest
    needs: test
    container:
      image: fedora:44
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            python3-devel \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            python3-copr \
            python3-httpx \
            python3-pytest \
            tar

      - name: Create source archive
        run: |
          VERSION=$(grep '__version__' copa/__init__.py | sed 's/.*"\(.*\)"/\1/')
          cd /tmp
          cp -r $GITHUB_WORKSPACE copa-${VERSION}
          tar czf $GITHUB_WORKSPACE/copa-${VERSION}.tar.gz copa-${VERSION}
          rm -rf copa-${VERSION}

      - name: Build SRPM
        run: |
          mkdir -p build/SRPMS
          rpmbuild -bs rpm/copa.spec \
            --define "_topdir $(pwd)/build" \
            --define "_sourcedir $(pwd)"

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: copa-srpm
          path: build/SRPMS/*.src.rpm
