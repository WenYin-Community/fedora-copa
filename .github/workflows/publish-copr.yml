name: Publish to Copr

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  trigger-copr:
    name: Trigger Copr Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for release tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '__version__' copa/__init__.py | sed 's/.*"\(.*\)"/\1/')
          TARBALL="fedora-copa-${VERSION}.tar.gz"
          REPO="${{ github.repository }}"
          TAG="${{ github.event.release.tag_name }}"

          echo "Waiting for asset '${TARBALL}' in release ${TAG}..."
          for i in $(seq 1 60); do
            if gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.assets[].name' 2>/dev/null | grep -qx "${TARBALL}"; then
              echo "Asset found."
              exit 0
            fi
            echo "  Attempt ${i}/60 - not found yet, retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for asset '${TARBALL}'."
          exit 1

      - name: Install copr-cli
        run: pip install copr-cli

      - name: Configure copr-cli credentials
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = ruojiner\ntoken = %s\ncopr_url = https://copr.fedorainfracloud.org\n' "$COPR_LOGIN" "$COPR_TOKEN" > ~/.config/copr

      - name: Trigger Copr build
        run: copr-cli build-package ruojiner/fedora-copa --name fedora-copa --nowait
