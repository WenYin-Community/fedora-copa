name: Publish to Copr

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  trigger-copr:
    name: Trigger Copr Build
    runs-on: ubuntu-latest
    steps:
      - name: Install copr-cli
        run: pip install copr-cli

      - name: Configure copr-cli credentials
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = ruojiner\ntoken = %s\ncopr_url = https://copr.fedorainfracloud.org\n' "$COPR_LOGIN" "$COPR_TOKEN" > ~/.config/copr

      - name: Trigger Copr build
        run: copr-cli build-package ruojiner/fedora-copa --name fedora-copa --nowait
