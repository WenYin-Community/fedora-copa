name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint dependencies
        run: |
          pip install ruff mypy

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy copa/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install copr httpx pytest
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-rpm:
    name: Build RPM (Fedora ${{ matrix.fedora_version }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        fedora_version: ['43', '44']
    container:
      image: fedora:${{ matrix.fedora_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            python3-devel \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            pyproject-rpm-macros \
            python3-copr \
            python3-httpx \
            python3-pytest \
            tar

      - name: Create source archive
        run: |
          cd /tmp
          cp -r $GITHUB_WORKSPACE copa-0.1.0
          tar czf $GITHUB_WORKSPACE/copa-0.1.0.tar.gz copa-0.1.0
          rm -rf copa-0.1.0

      - name: Build RPM
        run: |
          mkdir -p build/RPMS build/SRPMS
          rpmbuild -bb rpm/copa.spec \
            --define "_topdir $(pwd)/build" \
            --define "_sourcedir $(pwd)" \
            --target noarch

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: copa-rpm-fc${{ matrix.fedora_version }}
          path: build/RPMS/noarch/*.rpm

  build-srpm:
    name: Build SRPM
    runs-on: ubuntu-latest
    needs: [lint, test]
    container:
      image: fedora:44
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build \
            rpmdevtools \
            python3-devel \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            pyproject-rpm-macros \
            python3-copr \
            python3-httpx \
            python3-pytest \
            tar

      - name: Create source archive
        run: |
          cd /tmp
          cp -r $GITHUB_WORKSPACE copa-0.1.0
          tar czf $GITHUB_WORKSPACE/copa-0.1.0.tar.gz copa-0.1.0
          rm -rf copa-0.1.0

      - name: Build SRPM
        run: |
          mkdir -p build/SRPMS
          rpmbuild -bs rpm/copa.spec \
            --define "_topdir $(pwd)/build" \
            --define "_sourcedir $(pwd)"

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: copa-srpm
          path: build/SRPMS/*.src.rpm

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-rpm, build-srpm]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.rpm
            artifacts/**/*.src.rpm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-copr:
    name: Publish to Copr
    runs-on: ubuntu-latest
    needs: [build-srpm]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download SRPM
        uses: actions/download-artifact@v4
        with:
          name: copa-srpm
          path: srpm/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install copr-cli
        run: pip install copr-cli

      - name: Configure copr-cli
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr <<EOF
          [copr-cli]
          login = ${{ secrets.COPR_LOGIN }}
          username = ${{ secrets.COPR_USERNAME }}
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF

      - name: Upload to Copr
        run: |
          copr-cli build fedora-copa srpm/*.src.rpm
